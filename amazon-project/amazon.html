<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Amazon Project</title>

        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles/common/amazon-header.css">
        <link rel="stylesheet" href="styles/amazon.css">
        <link rel="stylesheet" href="styles/common/general.css">

    </head>

    <body>
        <div class="amazon-header">
            <div class="amazon-header-left-section">
                <a href="amazon.html" class="header-link" aria-label="Amazon Home">
                    <img class="amazon-logo" src="images/amazon-logo-white.png" alt="Amazon Logo">
                    <img class="mobile-logo" src="images/amazon-mobile-logo-white.png" alt="Amazon Mobile Logo">
                </a>
            </div>

            <div class="amazon-header-middle-section">
                <input class="search-bar" type="text" placeholder="Search">
                <button class="search-button" aria-label="Search">
                    <img class="search-icon" src="images/icons/search-icon.png" alt="Search Icon">
                </button>            
            </div>

            <div class="amazon-header-right-section">
                <a class="orders-link header-link" href="orders.html" aria-label="Returns and Orders">
                    <span class="returns-text">Returns</span>
                    <span class="orders-text">& Orders</span>
                </a>

                <a class="cart-link header-link" href="checkout.html" aria-label="Cart">
                    <img class="cart-icon" src="images/icons/cart-icon.png" alt="Cart Icon">
                    <div class="cart-quantity js-cart-quantity"></div>
                    <div class="cart-text">Cart</div>
                </a>
            </div>
        </div>

        <div class="main">
            <div class="product-grid js-products-grid">        
            </div>
        </div>

        <script type="module" src="scripts/amazon.js?v=20260707-1"></script>
    </body>
</html>
